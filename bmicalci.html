<!DOCTYPE HTML>
<html>
<head>
<title><i>A simple BMI calculator </i></title>
</head>
<body bgcolor=orange>
<h1 text align="center">A BMI CALCULATOR </h1>
<label for="height">Enter your height in meter:-:</label>
<input type="number" id="height" name="height"></input><br><br>
<label for="weight">Enter your weight in Kg:-:</label>
<input type="number" id="weight" name="weight"></input><br><br>
<button  type="button" onclick="calculate()">click to calculate</button><br><br>


<p id="result1"></p>

<script>
function calculate()
{


let weight1 = parseFloat(document.getElementById("weight").value);

let height1 = parseFloat(document.getElementById("height").value);


if (weight1 >0 && height1 >0)
{
let BMI = weight1/(height1**2);

document.getElementById("result1").innerText="This is your BMI: "+ BMI;
} 
else {
document.getElementById("result1").innerText="please enter valid values!";
 }
}
</script>
</body>
</html>
